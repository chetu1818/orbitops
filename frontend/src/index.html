<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrbitOps.ai | Enterprise Operations & Workflow Automation</title>
  <base href="/">
  <meta name="description"
    content="OrbitOps.ai automates manual, repetitive operational tasks and orchestrates secure enterprise data pipelines.">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230066FF'/%3E%3Cstop offset='100%25' stop-color='%23AF52DE'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='6.5' fill='url(%23g)'/%3E%3Cellipse cx='16' cy='16' rx='12' ry='3.5' fill='none' stroke='%2300B4D8' stroke-width='1.8' transform='rotate(35 16 16)'/%3E%3Cellipse cx='16' cy='16' rx='12' ry='3.5' fill='none' stroke='%237c3aed' stroke-width='1.8' transform='rotate(-35 16 16)'/%3E%3C/svg%3E">
  <link rel="alternate icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Grotesk:wght@700&display=swap"
    rel="stylesheet">
  
  <!-- Bootstrap Icons (for dotnet inbuilt style icons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CDNs for 3D and Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    /* CSS Variables & Core Themes (Apple Inspired) */
    :root {
      /* Default Dark Mode (Nova Void) */
      --primary: #F5F5F7;
      --secondary: #8ba3c7;
      --accent: #0071E3;
      --accent-secondary: #00B4D8;
      --bg-light: #020510;
      --bg-alt: #080e1a;
      --bg-subtle: #0c1527;
      --border: rgba(100, 160, 255, 0.1);
      --card-bg: rgba(10, 20, 40, 0.55);
      --header-bg: rgba(2, 5, 16, 0.85);
      --header-shadow: rgba(0, 0, 0, 0.4);
      --code-bg: #0c1527;
      --code-text: #F5F5F7;
      --header-height: 72px;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

      /* Chatbot variables */
      --chatbot-bg: rgba(10, 20, 40, 0.9);
      --chatbot-border: rgba(100, 160, 255, 0.15);
      --chatbot-shadow: rgba(0, 0, 0, 0.5);
      --chatbot-msg-bot: #0c1527;
      --chatbot-msg-bot-text: #F5F5F7;
      --chatbot-msg-user: #0071E3;
      --chatbot-msg-user-text: #FFFFFF;
    }

    /* 1. Explicit Light Mode Option */
    [data-theme="light"] {
      --primary: #1D1D1F;
      --secondary: #434e5e;
      --accent: #0071E3;
      --accent-secondary: #00B4D8;
      --bg-light: #F4F6F9;
      --bg-alt: #E9ECF0;
      --bg-subtle: #DFE3E8;
      --border: rgba(0, 0, 0, 0.06);
      --card-bg: #FFFFFF;
      --header-bg: rgba(244, 246, 249, 0.85);
      --header-shadow: rgba(0, 0, 0, 0.03);
      --code-bg: #E9ECF0;
      --code-text: #1D1D1F;

      --chatbot-bg: rgba(255, 255, 255, 0.85);
      --chatbot-border: rgba(0, 0, 0, 0.08);
      --chatbot-shadow: rgba(0, 0, 0, 0.1);
      --chatbot-msg-bot: #F1F5F9;
      --chatbot-msg-bot-text: #1E293B;
      --chatbot-msg-user: #0071E3;
      --chatbot-msg-user-text: #FFFFFF;
    }

    /* 2. Cyberpunk Neon (Futuristic Dark Neon) */
    [data-theme="cyber"] {
      --primary: #ffffff;
      --secondary: #00F0FF;
      --accent: #FF007F;
      --accent-secondary: #00F0FF;
      --bg-light: #000000;
      --bg-alt: #050508;
      --bg-subtle: #0c0c12;
      --border: rgba(255, 0, 127, 0.3);
      --card-bg: rgba(255, 0, 127, 0.06);
      --header-bg: rgba(5, 5, 8, 0.9);
      --header-shadow: rgba(255, 0, 127, 0.15);
      --code-bg: #0c0c12;
      --code-text: #39FF14;

      --chatbot-bg: rgba(5, 5, 8, 0.95);
      --chatbot-border: rgba(255, 0, 127, 0.35);
      --chatbot-shadow: rgba(0, 0, 0, 0.7);
      --chatbot-msg-bot: #0c0c12;
      --chatbot-msg-bot-text: #ffffff;
      --chatbot-msg-user: #FF007F;
      --chatbot-msg-user-text: #ffffff;
    }

    /* Clean Preloader styling (No Blur on background) */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020510; /* Solid dark theme void background */
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] #preloader { background: #F4F6F9; }
    [data-theme="cyber"] #preloader { background: #000000; }

    #preloader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      text-align: center;
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .logo-loader-svg {
      width: 100px;
      height: 100px;
      overflow: visible;
    }
    .loader-core-globe {
      transform-origin: 50px 50px;
      animation: corePulse 1.6s ease-in-out infinite alternate;
    }
    .globe-details {
      transform-origin: 50px 50px;
      animation: detailsRotate 3.5s linear infinite;
    }
    
    .orbit-group-1 {
      transform-origin: 50px 50px;
      animation: groupRotate1 3.5s linear infinite;
    }
    .orbiting-dot-1 {
      animation: dotPulse 1.4s ease-in-out infinite alternate;
    }
    
    .orbit-group-2 {
      transform-origin: 50px 50px;
      animation: groupRotate2 3s linear infinite;
    }
    .orbiting-dot-2 {
      animation: dotPulse 1.1s ease-in-out infinite alternate;
    }

    .node-sparkle-1 { animation: twinkle 0.8s ease-in-out infinite alternate; }
    .node-sparkle-2 { animation: twinkle 1.2s ease-in-out infinite alternate 0.2s; }
    .node-sparkle-3 { animation: twinkle 1.5s ease-in-out infinite alternate 0.4s; }
    .node-sparkle-4 { animation: twinkle 1s ease-in-out infinite alternate 0.6s; }

    @keyframes corePulse {
      from { 
        transform: scale(0.92); 
        filter: drop-shadow(0 0 3px rgba(59, 130, 246, 0.4)) url(#premiumGlow); 
      }
      to { 
        transform: scale(1.03); 
        filter: drop-shadow(0 0 9px rgba(59, 130, 246, 0.75)) url(#premiumGlow); 
      }
    }
    @keyframes detailsRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes groupRotate1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes groupRotate2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes dotPulse {
      from { r: 2.2; opacity: 0.6; }
      to { r: 4.2; opacity: 1; }
    }
    @keyframes twinkle {
      0% { opacity: 0.15; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1.25); }
    }

    .loader-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.05em;
      white-space: nowrap;
      opacity: 0.8;
    }

    /* Typewriter & RGB Title Styles */
    .rgb-text {
      background: linear-gradient(to right, #ff3366, #ff00ff, #3333ff, #00ffff, #33ff33, #ffff33, #ff3366);
      background-size: 400% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rgbFlow 8s linear infinite;
      display: inline;
    }

    @keyframes rgbFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .hero-type-cursor {
      color: #00F0FF;
      animation: blink 0.8s step-end infinite;
      display: inline;
      margin-left: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>
  <app-root>
    <!-- Preloader / Orbit Animated Loader active until Angular mounts -->
    <div id="preloader">
      <div class="loader-wrapper">
        <svg viewBox="0 0 100 100" class="logo-loader-svg">
          <defs>
            <!-- Core Radial Gradient -->
            <radialGradient id="loaderCoreGrad" cx="35%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#c084fc" />
              <stop offset="40%" stop-color="#3b82f6" />
              <stop offset="100%" stop-color="#1d4ed8" />
            </radialGradient>
            
            <!-- Ring Gradients for fading tails -->
            <linearGradient id="tealRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10b981" stop-opacity="1" />
              <stop offset="60%" stop-color="#059669" stop-opacity="0.3" />
              <stop offset="100%" stop-color="#047857" stop-opacity="0" />
            </linearGradient>
            
            <linearGradient id="purpleRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1" />
              <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.3" />
              <stop offset="100%" stop-color="#4c1d95" stop-opacity="0" />
            </linearGradient>

            <!-- Glow Filter -->
            <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur1" />
              <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur2" />
              <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <!-- Orbit Background Guides -->
          <g class="orbit-bg-guides" opacity="0.2">
            <ellipse cx="50" cy="50" rx="34" ry="11" fill="none" stroke="#ffffff" stroke-width="0.8" transform="rotate(35 50 50)" />
            <ellipse cx="50" cy="50" rx="34" ry="11" fill="none" stroke="#ffffff" stroke-width="0.8" transform="rotate(-35 50 50)" />
          </g>

          <!-- Orbit Ring 1 (Teal) with rotating dot -->
          <g class="orbit-group-1">
            <ellipse cx="50" cy="50" rx="34" ry="11" fill="none" stroke="url(#tealRingGrad)" stroke-width="2.2" stroke-linecap="round" transform="rotate(35 50 50)" />
            <g transform="rotate(35 50 50)">
              <circle cx="84" cy="50" r="3.2" fill="#10b981" filter="url(#premiumGlow)" class="orbiting-dot-1" />
            </g>
          </g>

          <!-- Orbit Ring 2 (Purple) with rotating dot -->
          <g class="orbit-group-2">
            <ellipse cx="50" cy="50" rx="34" ry="11" fill="none" stroke="url(#purpleRingGrad)" stroke-width="2.2" stroke-linecap="round" transform="rotate(-35 50 50)" />
            <g transform="rotate(-35 50 50)">
              <circle cx="16" cy="50" r="3.2" fill="#8b5cf6" filter="url(#premiumGlow)" class="orbiting-dot-2" />
            </g>
          </g>

          <!-- Central Globe with glow -->
          <circle cx="50" cy="50" r="19" fill="url(#loaderCoreGrad)" filter="url(#premiumGlow)" class="loader-core-globe" />
          
          <!-- Tech detail lines on the globe -->
          <g class="globe-details" opacity="0.45" stroke="#ffffff" stroke-width="0.8" fill="none">
            <circle cx="50" cy="50" r="13" stroke-dasharray="6 5" />
            <circle cx="50" cy="50" r="7" stroke-dasharray="2 3" />
            <line x1="50" y1="31" x2="50" y2="69" />
            <line x1="31" y1="50" x2="69" y2="50" />
          </g>

          <!-- Twinkling Sparkles (tech nodes) -->
          <g class="tech-nodes">
            <circle cx="28" cy="34" r="1.5" fill="#ffffff" filter="url(#premiumGlow)" class="node-sparkle-1" />
            <circle cx="72" cy="66" r="1.5" fill="#ffffff" filter="url(#premiumGlow)" class="node-sparkle-2" />
            <circle cx="69" cy="28" r="2" fill="#10b981" filter="url(#premiumGlow)" class="node-sparkle-3" />
            <circle cx="31" cy="72" r="2" fill="#8b5cf6" filter="url(#premiumGlow)" class="node-sparkle-4" />
          </g>
        </svg>
        <div class="loader-text">Synchronizing Orbit Matrix...</div>
      </div>
    </div>
  </app-root>

  <script>
    // Clean Fade-out Preloader (No numerical countdowns)
    (function () {
      const preloader = document.getElementById('preloader');
      const start = Date.now();
      
      function hidePreloader() {
        const elapsed = Date.now() - start;
        const delay = Math.max(0, 800 - elapsed); // Keep visible for at least 800ms for visual smoothness
        
        setTimeout(() => {
          if (preloader) {
            preloader.classList.add('fade-out');
          }
        }, delay);
      }

      if (document.readyState === 'complete') {
        hidePreloader();
      } else {
        window.addEventListener('load', hidePreloader);
      }
    })();
  </script>
</body>

</html>
