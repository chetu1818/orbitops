apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbitops-api
  namespace: default
  labels:
    app: orbitops-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orbitops-api
  template:
    metadata:
      labels:
        app: orbitops-api
    spec:
      containers:
        - name: api
          image: orbitops-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
